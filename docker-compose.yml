services:
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - proxy-ssl:/etc/nginx/ssl
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
    expose:
      - 8080
    restart: unless-stopped
    networks:
      - app
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    expose:
      - 8000
    env_file:
      - ./api/.env
    environment:
      APP_ENV: production
      APP_DEBUG: false
      DB_HOST: pgsql
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-inventory}
      DB_USERNAME: ${DB_USERNAME:-app}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      TRUSTED_PROXIES: "*"
      TRUSTED_HOSTS: "*"
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app
    healthcheck:
      test: ["CMD", "php", "artisan", "octane:status"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  pgsql:
    image: postgres:17-alpine
    expose:
      - 5432
    environment:
      POSTGRES_DB: ${DB_DATABASE:-inventory}
      POSTGRES_USER: ${DB_USERNAME:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-app} -d ${DB_DATABASE:-inventory}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    expose:
      - 6379
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgsql-data:
  redis-data:
  proxy-ssl:

networks:
  app:
    driver: bridge
