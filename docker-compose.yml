services:
  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile

    env_file:
      - ./ui/.env

    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

    networks:
      - app

  backend:
    build:
      context: ./api
      dockerfile: Dockerfile

    env_file:
      - ./api/.env

    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - app

  pgsql:
    image: postgres:17-alpine

    environment:
      POSTGRES_DB: ${DB_DATABASE:-inventory}
      POSTGRES_USER: ${DB_USERNAME:-elicom}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}

    env_file:
      - ./api/.env

    volumes:
      - pgsql-data:/var/lib/postgresql/data

    restart: unless-stopped

    networks:
      - app

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-app} -d ${DB_DATABASE:-inventory}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

    volumes:
      - redis-data:/data

    restart: unless-stopped

    networks:
      - app

    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgsql-data:
  redis-data:

networks:
  app:
    driver: bridge
