services:
  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile

    expose:
      - '8080'

    restart: unless-stopped

    networks:
      - app

    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/up']
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    environment:
      APP_ENV: production
      APP_DEBUG: false

      DB_HOST: pgsql
      DB_PORT: 5432

      REDIS_HOST: redis
      REDIS_PORT: 6379

    expose:
      - '8000'

    restart: unless-stopped

    networks:
      - app

  proxy:
    image: nginx:alpine

    ports:
      - '80:80'
      - '443:443'

    volumes:
      - ./proxy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      frontend:
        condition: service_started

      backend:
        condition: service_started

    restart: unless-stopped

    networks:
      - app

    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 5s
      retries: 3
